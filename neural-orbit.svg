<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-core" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes rotate1 {
      0% { transform: rotate(0deg); animation-timing-function: linear; }
      20% { transform: rotate(90deg); animation-timing-function: ease-in; }
      30% { transform: rotate(1170deg); animation-timing-function: linear; }
      40% { transform: rotate(2970deg); animation-timing-function: ease-out; }
      50% { transform: rotate(3150deg); animation-timing-function: linear; }
      75% { transform: rotate(3195deg); animation-timing-function: linear; }
      100% { transform: rotate(3600deg); }
    }
    @keyframes rotate2 {
      0% { transform: rotate(3600deg); animation-timing-function: linear; }
      20% { transform: rotate(3510deg); animation-timing-function: ease-in; }
      30% { transform: rotate(2430deg); animation-timing-function: linear; }
      40% { transform: rotate(630deg); animation-timing-function: ease-out; }
      50% { transform: rotate(450deg); animation-timing-function: linear; }
      75% { transform: rotate(405deg); animation-timing-function: linear; }
      100% { transform: rotate(0deg); }
    }
    @keyframes rotate3 {
      0% { transform: rotate(0deg); animation-timing-function: linear; }
      20% { transform: rotate(45deg); animation-timing-function: ease-in; }
      30% { transform: rotate(765deg); animation-timing-function: linear; }
      40% { transform: rotate(2205deg); animation-timing-function: ease-out; }
      50% { transform: rotate(2340deg); animation-timing-function: linear; }
      75% { transform: rotate(2430deg); animation-timing-function: linear; }
      100% { transform: rotate(2880deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }
    .ring-1 { transform-origin: 200px 200px; animation: rotate1 10s infinite; }
    .ring-2 { transform-origin: 200px 200px; animation: rotate2 12s infinite; }
    .ring-3 { transform-origin: 200px 200px; animation: rotate3 14s infinite; }
    .core { transform-origin: 200px 200px; animation: pulse 3s ease-in-out infinite; }
    
    /* Variables matching #F59E0B (Amber-500) */
  </style>

  <!-- Base Transparent Layer -->
  <rect width="400" height="400" fill="transparent" />

  <!-- Central Intelligence Core -->
  <circle cx="200" cy="200" r="18" fill="#F59E0B" filter="url(#glow-core)" class="core" />
  <circle cx="200" cy="200" r="8" fill="#FFF" class="core" opacity="0.9" filter="url(#glow)" />

  <!-- Ring 1 (Inner) -->
  <g class="ring-1">
    <circle cx="200" cy="200" r="60" fill="none" stroke="rgba(245, 158, 11, 0.25)" stroke-width="1.5" />
    <circle cx="260" cy="200" r="4" fill="#F59E0B" filter="url(#glow)" />
    <circle cx="140" cy="200" r="3" fill="#F59E0B" opacity="0.7" />
    <path d="M 200 140 A 60 60 0 0 1 260 200" fill="none" stroke="#F59E0B" stroke-width="2.5" opacity="0.8" />
  </g>

  <!-- Ring 2 (Middle) -->
  <g class="ring-2">
    <circle cx="200" cy="200" r="105" fill="none" stroke="rgba(245, 158, 11, 0.15)" stroke-width="1" />
    <circle cx="200" cy="95" r="5" fill="#F59E0B" filter="url(#glow)" />
    <circle cx="200" cy="305" r="3" fill="#F59E0B" />
    <circle cx="109" cy="252" r="4" fill="#F59E0B" opacity="0.8" filter="url(#glow)" />
    <path d="M 200 95 A 105 105 0 0 1 305 200" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.5" stroke-dasharray="10 5" />
  </g>

  <!-- Ring 3 (Outer) -->
  <g class="ring-3">
    <circle cx="200" cy="200" r="150" fill="none" stroke="rgba(245, 158, 11, 0.08)" stroke-width="1" />
    <circle cx="50" cy="200" r="6" fill="#F59E0B" filter="url(#glow)" />
    <circle cx="329" cy="125" r="3.5" fill="#F59E0B" filter="url(#glow)" />
    <circle cx="125" cy="329" r="2.5" fill="#F59E0B" opacity="0.5" />
    <path d="M 50 200 A 150 150 0 0 1 200 50" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.3" stroke-dasharray="20 10 5 10" />
  </g>

  <!-- Static/Pulsing Data Connections -->
  <line x1="200" y1="200" x2="260" y2="200" stroke="rgba(245, 158, 11, 0.25)" stroke-width="1.5" class="ring-1" />
  <line x1="200" y1="200" x2="200" y2="95" stroke="rgba(245, 158, 11, 0.15)" stroke-width="1" stroke-dasharray="4 4" class="ring-2" />
  <line x1="200" y1="200" x2="50" y2="200" stroke="rgba(245, 158, 11, 0.1)" stroke-width="1" stroke-dasharray="2 4" class="ring-3" />
</svg>
